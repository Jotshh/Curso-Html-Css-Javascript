<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS DOM</title>
</head>
<body>

    <button onclick="alert('Abrindo janela pelo JS')">Clique aqui</button>
    
    <button id="abreJanela">Abre janela</button>
    <script>
        const btAbreJanela = document.querySelector('#abreJanela');

        btAbreJanela.addEventListener('click', () => {
            alert('Abrindo janela pelo script incorporado');
        });
    </script>

    <button id="abreAlertVinculado">Abre janela via código vinculado</button>

    <script src="js/scripts.js"></script>
</body>
</html>
