<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários em HTML</title>
</head>

<body>
    <main>
        <section>
            <!-- o atributo name é utilizado para dar um nome ao formulário, e pode ser usado para identificar o formulário em scripts; 
             o atributo method define o método de envio dos dados do formulário para o servidor; 
             e o metodo post significa que os dados serão enviados no corpo da requisição; 
             action define o destino dos dados do formulário -->

            <form name="cadastro" method="post" action="cadastro.php">

                <fieldset> <!-- Agrupamento de campos -->
                    <!-- dentro da tag <form> ficarão os campos e botões do formulário  -->

                    <legend>Dados Pessoais</legend>
                    <!-- O elemento <legend> é utilizado para fornecer um título ou descrição para o grupo de campos dentro do <fieldset>, melhorando a organização e a acessibilidade do formulário -->

                    <div id="nome">

                        <label for="name">Nome: </label>
                        <!-- o atributo for é utilizado para associar o rótulo ao campo de entrada correspondente, melhorando a acessibilidade do formulário -->

                        <input type="text" id="name" placeholder="Digite seu nome completo:" required>
                    </div>

                    <div id="email">
                        <label for="campo-email">Email: </label>

                        <input type="email" id="campo-email" placeholder="Seu email:" required>
                    </div>

                    <!-- o tipo radio é utilizado para criar botões de opção, onde apenas uma opção pode ser selecionada -->

                    <div id="genero">
                        <label for="campo-genero">Gênero: </label>
                        <input type="radio" value="masculino" name="genero"> <span>Masculino</span>
                        <input type="radio" value="feminino" name="genero"> <span>Feminino</span>
                        <input type="radio" value="outro" name="genero"> <span>Outro</span>
                    </div>

                    <!-- o tipo checkbox é utilizado para criar caixas de seleção, onde múltiplas opções podem ser selecionadas -->

                    <div id="interesse">
                        <label for="campo-interesse">Área de Interesse: </label>
                        <input type="checkbox" name="interesse" value="TI"> <span>Tecnologia da Informação</span> 
                        <input type="checkbox" name="interresse" value="comercial"> <span>Comercial</span>
                        <input type="checkbox" name="interresse" value="financeiro"> <span>Financeiro</span>
                    </div>

                    <div id="cidade">
                        <label for="cp-cidade">Cidade:</label>
                        <input type="text" placeholder="Cidade:" required>
                    </div>

                    <div id="cidade">
                        <label>Estado:</label>
                        <select name="uf">
                            <option value="Santa Catarina">SC</option>
                            <option value="Mato Grosso do Sul">MS</option>
                            <option value="Pará">PA</option>
                            <option value="Acre">AC</option>
                            <option value="São Paulo">SP</option>
                        </select>
                    </div>

                </fieldset>

                <input type="submit" value="Cadastrar">

            </form>
        </section>
    </main>
</body>

</html>
