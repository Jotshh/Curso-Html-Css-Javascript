<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags</title>
    <!-- utilizando o f12 no navegador, podemos inspecionar os elementos e  
    ver a hierarquia das tags, ou seja, o escopo de cada tag. -->
</head>

<body>
    <header>
        escopo do header
    </header>

    <nav>
        escopo do nav
    </nav>

    <main>
        <article>
            <h1>Título 01</h1>
            <h2>Título 02</h2>
            <h3>Título 03</h3>
            <h4>Título 04</h4>
            <h5>Título 05</h5>
            <h6>Título 06</h6>
            <!-- quando seguramos Shift + Alt + Seta para baixo, 
            copiamos a linha para baixo -->
        </article>

        <article>
            escopo do article
        </article>

        <article>
            escopo do article
        </article>
    </main>

    <footer>
        escopo do footer
    </footer>

</body>

</html>
